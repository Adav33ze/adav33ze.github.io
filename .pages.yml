media:
  input: public/images/portfolio
  output: images/portfolio
  url: https://adav33ze.com

content:
  - name: hero
    label: Homepage Hero
    type: file
    path: data/hero.json
    format: json
    fields:
      - name: mode
        label: Hero Mode
        type: select
        default: single
        required: true
        options:
          - label: Single Image
            value: single
          - label: Slideshow
            value: slideshow
          - label: Video
            value: video
      - name: image
        label: Single Image (used when mode is Single Image)
        type: image
      - name: alt
        label: Single Image Alt Text
        type: string
      - name: video
        label: Video (used when mode is Video)
        type: file
        options:
          accept: "video/mp4,video/webm,video/quicktime"
          input: public/videos/hero
          output: videos/hero
      - name: videoPoster
        label: "Video Poster / Fallback Image (shown while video loads, or on unsupported devices)"
        type: image
      - name: videoAlt
        label: Video Alt / Description Text
        type: string
      - name: slides
        label: Slideshow Slides (used when mode is Slideshow)
        type: object
        list: true
        fields:
          - name: mediaType
            label: Slide Type
            type: select
            options:
              - label: Image
                value: image
              - label: Video
                value: video
          - name: image
            label: "Image (used when Slide Type is Image)"
            type: image
          - name: video
            label: "Video (used when Slide Type is Video)"
            type: file
            options:
              accept: "video/mp4,video/webm,video/quicktime"
              input: public/videos/hero
              output: videos/hero
          - name: videoPoster
            label: "Video Poster (used when Slide Type is Video)"
            type: image
          - name: alt
            label: Alt / Description Text
            type: string

  - name: profile
    label: Profile Image
    type: file
    path: data/profile.json
    format: json
    fields:
      - name: image
        label: Profile Photo
        type: image
      - name: alt
        label: Image Alt Text
        type: string

  - name: portfolio
    label: Portfolio Projects
    type: file
    path: data/portfolio.json
    format: json
    fields:
      - name: projects
        label: Projects
        type: object
        list: true
        fields:
          - name: title
            label: Project Title
            type: string
          - name: slug
            label: URL Slug (e.g. villa-qag-jabi-lake)
            type: string
          - name: category
            label: Category
            type: string
          - name: location
            label: Location
            type: string
          - name: image
            label: Cover Image
            type: image
          - name: alt_text
            label: Cover Image Alt Text (SEO)
            type: string
          - name: description
            label: Short Description
            type: text
          - name: write_up
            label: Project Write-up (shown on project page)
            type: text
          - name: gallery
            label: Gallery (Images & Videos)
            type: object
            list: true
            fields:
              - name: mediaType
                label: Media Type
                type: select
                options:
                  - label: Image
                    value: image
                  - label: Video
                    value: video
              - name: image
                label: "Image (used when Media Type is Image)"
                type: image
              - name: video
                label: "Video (used when Media Type is Video, e.g. walkthrough animations)"
                type: file
                options:
                  accept: "video/mp4,video/webm,video/quicktime"
                  input: public/videos/portfolio
                  output: videos/portfolio
              - name: videoPoster
                label: "Video Poster / Thumbnail (used when Media Type is Video)"
                type: image
              - name: alt_text
                label: Alt Text (SEO)
                type: string

  - name: blog
    label: Journal Posts
    type: file
    path: data/blog.json
    format: json
    fields:
      - name: posts
        label: Posts
        type: object
        list: true
        fields:
          - name: title
            label: Post Title
            type: string
          - name: slug
            label: URL Slug (e.g. designing-for-abujas-climate)
            type: string
          - name: date
            label: Display Date (e.g. Jun 2026)
            type: string
          - name: excerpt
            label: Short Excerpt (shown in journal list)
            type: text
          - name: body
            label: Post Body (separate paragraphs with a blank line)
            type: text

  - name: testimonials
    label: Testimonials
    type: file
    path: data/testimonials.json
    format: json
    fields:
      - name: testimonials
        label: Testimonials
        type: object
        list: true
        fields:
          - name: quote
            label: Quote
            type: text
          - name: name
            label: Client Name
            type: string
          - name: title
            label: Project / Role (e.g. Villa QAG, Abuja)
            type: string
          - name: year
            label: Year (e.g. 2024)
            type: string

# Add these three entries to the `content:` list in your .pages.yml,
# alongside hero/profile/portfolio/blog/testimonials.

  - name: contact
    label: Contact Details
    type: file
    path: data/contact.json
    format: json
    fields:
      - name: email
        label: Email
        type: string
      - name: whatsappNumber
        label: "WhatsApp Number (digits only, with country code, e.g. 2348065506222)"
        type: string
      - name: telegramUsername
        label: "Telegram Username (no @)"
        type: string

  - name: services
    label: Services (Pricing Page)
    type: file
    path: data/services.json
    format: json
    fields:
      - name: services
        label: Services
        type: object
        list: true
        fields:
          - name: title
            label: Title
            type: string
          - name: description
            label: Description
            type: text

  - name: rendering-packages
    label: Rendering Packages
    type: file
    path: data/rendering-packages.json
    format: json
    fields:
      - name: heroImage
        label: Header Image
        type: image
      - name: heroImageAlt
        label: Header Image Alt Text (SEO)
        type: string
      - name: categories
        label: Categories (e.g. Interior, Exterior)
        type: object
        list: true
        fields:
          - name: id
            label: "ID (short, no spaces, e.g. interior)"
            type: string
          - name: label
            label: "Display Label (e.g. Interior Renders)"
            type: string
          - name: image
            label: Category Image
            type: image
          - name: imageAlt
            label: Category Image Alt Text (SEO)
            type: string
          - name: tiers
            label: Tiers (prices in USD — NGN is calculated automatically)
            type: object
            list: true
            fields:
              - name: name
                label: Tier Name
                type: string
              - name: renderCount
                label: Number of Renders
                type: number
              - name: bestFor
                label: Best For
                type: string
              - name: turnaround
                label: Turnaround (e.g. 2–3 days)
                type: string
              - name: price
                label: Price in USD
                type: number
              - name: revisionsIncluded
                label: Revisions Included
                type: number
      - name: addOns
        label: Add-ons (prices in USD)
        type: object
        list: true
        fields:
          - name: label
            label: Label
            type: string
          - name: amountUsd
            label: Amount in USD
            type: number
          - name: isDelta
            label: "Show a + prefix? (e.g. +$40 vs a flat $150)"
            type: boolean
