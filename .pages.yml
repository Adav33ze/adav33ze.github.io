media:
  input: public/images/portfolio
  output: images/portfolio
  url: https://adav33ze.com

content:
  - name: hero
    label: Homepage Hero
    type: file
    path: data/hero.json
    format: json
    fields:
      - name: mode
        label: Hero Mode
        type: select
        options:
          - label: Single Image
            value: single
          - label: Slideshow
            value: slideshow
      - name: image
        label: Single Image (used when mode is Single Image)
        type: image
      - name: alt
        label: Single Image Alt Text
        type: string
      - name: slides
        label: Slideshow Images (used when mode is Slideshow)
        type: object
        list: true
        fields:
          - name: image
            label: Image
            type: image
          - name: alt
            label: Alt Text
            type: string

  - name: profile
    label: Profile Image
    type: file
    path: data/profile.json
    format: json
    fields:
      - name: image
        label: Profile Photo
        type: image
      - name: alt
        label: Image Alt Text
        type: string

  - name: portfolio
    label: Portfolio Projects
    type: file
    path: data/portfolio.json
    format: json
    fields:
      - name: projects
        label: Projects
        type: object
        list: true
        fields:
          - name: title
            label: Project Title
            type: string
          - name: slug
            label: URL Slug (e.g. villa-qag-jabi-lake)
            type: string
          - name: category
            label: Category
            type: string
          - name: location
            label: Location
            type: string
          - name: image
            label: Cover Image
            type: image
          - name: alt_text
            label: Cover Image Alt Text (SEO)
            type: string
          - name: description
            label: Short Description
            type: text
          - name: write_up
            label: Project Write-up (shown on project page)
            type: text
          - name: gallery
            label: Gallery Images
            type: object
            list: true
            fields:
              - name: image
                label: Image
                type: image
              - name: alt_text
                label: Alt Text (SEO)
                type: string

  - name: blog
    label: Journal Posts
    type: file
    path: data/blog.json
    format: json
    fields:
      - name: posts
        label: Posts
        type: object
        list: true
        fields:
          - name: title
            label: Post Title
            type: string
          - name: slug
            label: URL Slug (e.g. designing-for-abujas-climate)
            type: string
          - name: date
            label: Display Date (e.g. Jun 2026)
            type: string
          - name: excerpt
            label: Short Excerpt (shown in journal list)
            type: text
          - name: body
            label: Post Body (separate paragraphs with a blank line)
            type: text

  - name: testimonials
    label: Testimonials
    type: file
    path: data/testimonials.json
    format: json
    fields:
      - name: testimonials
        label: Testimonials
        type: object
        list: true
        fields:
          - name: quote
            label: Quote
            type: text
          - name: name
            label: Client Name
            type: string
          - name: title
            label: Project / Role (e.g. Villa QAG, Abuja)
            type: string
          - name: year
            label: Year (e.g. 2024)
            type: string
